<!DOCTYPE html>
<html>
<head>
    <title>ToDo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">My ToDo App</h2>

    <!-- Add Task -->
    <form method="POST" class="d-flex mb-4">
        {% csrf_token %}
        <input type="text" name="title" class="form-control me-2" placeholder="Enter task">
        <button class="btn btn-primary">Add</button>
    </form>

    <!-- Task List -->
    {% for task in tasks %}
        <div class="card mb-2 p-3 d-flex flex-row justify-content-between align-items-center">
            
            <span class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                {{ task.title }}
            </span>

            <div>
                <a href="{% url 'complete' task.id %}" class="btn btn-success btn-sm">✔</a>
                <a href="{% url 'edit' task.id %}" class="btn btn-warning btn-sm">✏️</a>
                <a href="{% url 'delete' task.id %}" class="btn btn-danger btn-sm">❌</a>
            </div>

        </div>
    {% endfor %}
</div>

</body>
</html>
